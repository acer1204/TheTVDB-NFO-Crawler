<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TheTVDB NFO Crawler</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { color-scheme: dark; }
body { background: #0D1117; color: #E6EDF3; font-family: 'Inter', 'Noto Sans TC', system-ui, sans-serif; min-height: 100vh; }
.app { max-width: 780px; margin: 0 auto; padding: 48px 24px 80px; }

.header { margin-bottom: 24px; }
.header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.4px; }
.header p { color: #8B949E; font-size: 13px; margin-top: 5px; }

/* ── Card ── */
.card { background: #161B22; border: 1px solid #30363D; border-radius: 10px; margin-bottom: 14px; overflow: hidden; }
.card-body { padding: 20px 24px; }

/* ── Search form ── */
.search-row { display: flex; gap: 8px; }
.input-box { display: flex; align-items: center; background: #0D1117; border: 1px solid #30363D; border-radius: 6px; height: 38px; padding: 0 12px; flex: 1; transition: border-color .15s; }
.input-box:focus-within { border-color: #388bfd; }
.input-box input, .input-box select { flex: 1; background: transparent; border: none; color: #E6EDF3; font-size: 13px; font-family: inherit; outline: none; }
.input-box input::placeholder { color: #484F58; }
.btn { height: 38px; padding: 0 18px; background: #238636; color: #fff; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; white-space: nowrap; transition: background .15s; flex-shrink: 0; }
.btn:hover { background: #2EA043; }

.opts { display: flex; gap: 8px; margin-top: 10px; }
.opt { display: flex; flex-direction: column; gap: 4px; flex: 1; }
.opt label { font-size: 11px; color: #8B949E; font-weight: 500; }

/* ── Language priority pills ── */
.priority-row { display: flex; align-items: center; gap: 10px; margin-top: 14px; padding-top: 14px; border-top: 1px solid #21262D; flex-wrap: wrap; }
.priority-label { font-size: 11px; font-weight: 600; color: #6e7681; text-transform: uppercase; letter-spacing: .5px; white-space: nowrap; }
.pills { display: flex; gap: 6px; flex-wrap: wrap; }
.pill { display: inline-flex; align-items: center; gap: 5px; background: #0D1117; border: 1px solid #30363D; border-radius: 20px; padding: 4px 10px 4px 7px; cursor: grab; user-select: none; transition: border-color .15s, background .15s; }
.pill:hover { border-color: #484F58; }
.pill:active { cursor: grabbing; }
.pill.dragging { opacity: 0.25; }
.pill.drag-over { border-color: #388bfd; background: #388bfd0d; }
.pill-grip { color: #3d444d; font-size: 13px; line-height: 1; }
.pill-badge { width: 19px; height: 19px; border-radius: 4px; font-size: 10px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
.pill-text { font-size: 12px; font-weight: 500; color: #cdd9e5; }
.pill-num { font-size: 10px; color: #484F58; min-width: 8px; }

/* ── Search results ── */
.search-results { border-top: 1px solid #21262D; display: none; }
.r-item { display: flex; align-items: center; gap: 14px; padding: 11px 24px; border-bottom: 1px solid #21262D; cursor: pointer; transition: background .1s; }
.r-item:last-child { border-bottom: none; }
.r-item:hover { background: #1c2128; }
.r-poster { width: 44px; height: 64px; object-fit: cover; border-radius: 4px; flex-shrink: 0; background: #21262D; }
.r-info { flex: 1; min-width: 0; }
.r-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.r-name span { font-size: 11px; font-weight: 400; color: #8B949E; margin-left: 4px; }
.r-meta { font-size: 11px; color: #8B949E; margin-top: 3px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.r-msg { padding: 13px 24px; font-size: 13px; }

/* ── Output card ── */
.out-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 24px 0; }
.out-title { font-size: 11px; font-weight: 600; color: #6e7681; text-transform: uppercase; letter-spacing: .5px; }
.console { background: #0D1117; padding: 14px 20px; height: 280px; overflow-y: auto; font-family: 'Cascadia Code', 'Consolas', monospace; font-size: 12px; line-height: 1.7; margin-top: 12px; border-top: 1px solid #21262D; }
.log { word-break: break-all; }
.log.muted { color: #8B949E; }
.log.bright { color: #3FB950; }
.log.white { color: #cdd9e5; }
.log.error { color: #F85149; }
.status-bar { display: flex; align-items: center; gap: 8px; padding: 10px 20px; font-size: 12px; color: #8B949E; border-top: 1px solid #21262D; }
.dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.dot.running { background: #D29922; animation: pulse 1s infinite; }
.dot.done { background: #3FB950; }
.dot.error { background: #F85149; }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

#poster-float {
  position: fixed; z-index: 9999; pointer-events: none;
  border-radius: 8px; overflow: hidden;
  box-shadow: 0 16px 48px rgba(0,0,0,.8), 0 0 0 1px rgba(255,255,255,.08);
  opacity: 0; transform: scale(.94);
  transition: opacity .15s ease, transform .15s ease;
}
#poster-float.show { opacity: 1; transform: scale(1); }
#poster-float img { width: 160px; height: 232px; object-fit: cover; display: block; }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <h1>TheTVDB NFO Crawler</h1>
    <p>輸入動漫名稱，自動從 TheTVDB 爬取完整的 NFO 資訊</p>
  </div>

  <div class="card">
    <div class="card-body">

      <div class="search-row">
        <div class="input-box">
          <input id="queryInput" type="text" placeholder="動漫名稱 / TVDB 網址 / TVDB ID" autocomplete="off">
        </div>
        <button class="btn" onclick="doSearch()">搜尋</button>
      </div>

      <div class="opts">
        <div class="opt">
          <label>輸出目錄</label>
          <div class="input-box">
            <input id="outputDir" type="text" placeholder="./output" value="./output">
          </div>
        </div>
      </div>

      <div class="priority-row">
        <span class="priority-label">語系優先</span>
        <div class="pills" id="langList"></div>
      </div>

    </div>
    <div class="search-results" id="searchResults"></div>
  </div>

  <div class="card">
    <div class="out-header">
      <span class="out-title">輸出結果</span>
    </div>
    <div class="console" id="console">
      <div class="log muted">等待輸入 ...</div>
    </div>
    <div class="status-bar" id="statusBar" style="display:none">
      <div class="dot" id="statusDot"></div>
      <span id="statusText"></span>
    </div>
  </div>

</div>
<script>
const consoleEl = document.getElementById('console');
const statusBar = document.getElementById('statusBar');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const resultsEl = document.getElementById('searchResults');
let polling = null;

// ── 語系優先順序 ──────────────────────────────────────────
const LANGS = [
  { key: 'zhtw', label: '繁體中文', short: '繁', color: '#388bfd' },
  { key: 'zho',  label: '簡體中文', short: '簡', color: '#d29922' },
  { key: 'jpn',  label: '日文',     short: '日', color: '#f85149' },
  { key: 'eng',  label: '英文',     short: '英', color: '#3fb950' },
];

let langPriority = (() => {
  try { return JSON.parse(localStorage.getItem('langPriority')) || null; } catch { return null; }
})() || LANGS.map(l => l.key);

// 從優先順序第一位推導 TVDB 搜尋語言代碼
const PRIORITY_TO_LANG = { zhtw: 'zho', zho: 'zho', jpn: 'jpn', eng: 'eng' };
function getSearchLang() { return PRIORITY_TO_LANG[langPriority[0]] || 'zho'; }

function savePriority() {
  localStorage.setItem('langPriority', JSON.stringify(langPriority));
}

function renderLangList() {
  document.getElementById('langList').innerHTML = langPriority.map((key, idx) => {
    const L = LANGS.find(l => l.key === key);
    return `<div class="pill" draggable="true" data-key="${key}">
      <span class="pill-grip">⠿</span>
      <span class="pill-badge" style="background:${L.color}1a;color:${L.color};border:1px solid ${L.color}33">${L.short}</span>
      <span class="pill-text">${L.label}</span>
      <span class="pill-num">${idx + 1}</span>
    </div>`;
  }).join('');
  bindDrag();
}

let dragSrcKey = null;
function bindDrag() {
  document.querySelectorAll('.pill').forEach(el => {
    el.addEventListener('dragstart', e => {
      dragSrcKey = el.dataset.key;
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => el.classList.add('dragging'), 0);
    });
    el.addEventListener('dragend', () => {
      el.classList.remove('dragging');
      document.querySelectorAll('.pill').forEach(i => i.classList.remove('drag-over'));
    });
    el.addEventListener('dragover', e => {
      e.preventDefault();
      document.querySelectorAll('.pill').forEach(i => i.classList.remove('drag-over'));
      if (el.dataset.key !== dragSrcKey) el.classList.add('drag-over');
    });
    el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
    el.addEventListener('drop', e => {
      e.preventDefault();
      const dstKey = el.dataset.key;
      if (dragSrcKey && dragSrcKey !== dstKey) {
        const src = langPriority.indexOf(dragSrcKey);
        const dst = langPriority.indexOf(dstKey);
        langPriority.splice(dst, 0, langPriority.splice(src, 1)[0]);
        savePriority();
        renderLangList();
      }
    });
  });
}
renderLangList();
// ─────────────────────────────────────────────────────────

function addLog(msg, cls) {
  const d = document.createElement('div');
  d.className = 'log ' + (cls || 'white');
  d.textContent = msg;
  consoleEl.appendChild(d);
  consoleEl.scrollTop = consoleEl.scrollHeight;
}
function clearLogs() { consoleEl.innerHTML = ''; }

function setStatus(s) {
  statusBar.style.display = s ? 'flex' : 'none';
  statusDot.className = 'dot';
  if (s === 'running') { statusDot.classList.add('running'); statusText.textContent = '爬取中 ...'; }
  else if (s === 'done')  { statusDot.classList.add('done');    statusText.textContent = '完成'; }
  else if (s === 'error') { statusDot.classList.add('error');   statusText.textContent = '發生錯誤'; }
}

async function doSearch() {
  const q = document.getElementById('queryInput').value.trim();
  if (!q) return;
  resultsEl.innerHTML = '<div class="r-msg" style="color:#8B949E">搜尋中 ...</div>';
  resultsEl.style.display = 'block';
  try {
    const resp = await fetch('/api/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: q, lang: getSearchLang() })
    });
    const data = await resp.json();
    if (data.error) {
      resultsEl.innerHTML = `<div class="r-msg" style="color:#F85149">${data.error}</div>`;
      return;
    }
    const results = data.results || [];
    if (!results.length) {
      resultsEl.innerHTML = '<div class="r-msg" style="color:#8B949E">找不到任何結果</div>';
      return;
    }
    if (results.length === 1) {
      resultsEl.style.display = 'none';
      startCrawl(results[0].id, results[0].name);
      return;
    }
    resultsEl.innerHTML = results.map(r => `
      <div class="r-item" onclick="startCrawl('${r.id}','${r.name.replace(/'/g,"\\'")}')">
        <img class="r-poster"
             src="https://artworks.thetvdb.com/banners/posters/${r.id}-1.jpg"
             onerror="this.onerror=null;this.style.visibility='hidden';this.dataset.failed='1'" alt="">
        <div class="r-info">
          <div class="r-name">${r.name}<span>${r.year || ''}</span></div>
          <div class="r-meta">ID ${r.id}${r.overview ? '　' + r.overview : ''}</div>
        </div>
      </div>`).join('');
  } catch (e) {
    resultsEl.innerHTML = `<div class="r-msg" style="color:#F85149">搜尋失敗: ${e.message}</div>`;
  }
}

function startCrawl(seriesId, title) {
  resultsEl.style.display = 'none';
  clearLogs();
  addLog(`選取: ${title} (ID: ${seriesId})`, 'bright');
  addLog('開始爬取 ...', 'muted');
  setStatus('running');
  fetch('/api/crawl', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id: seriesId, lang: getSearchLang(), lang_priority: langPriority })
  }).then(r => r.json()).then(data => {
    if (data.error) { addLog('錯誤: ' + data.error, 'error'); setStatus('error'); return; }
    pollTask(data.task_id);
  }).catch(e => { addLog('錯誤: ' + e.message, 'error'); setStatus('error'); });
}

function pollTask(taskId) {
  if (polling) clearInterval(polling);
  polling = setInterval(async () => {
    try {
      const task = await fetch('/api/status/' + taskId).then(r => r.json());
      const cur = consoleEl.querySelectorAll('.log').length;
      for (let i = cur; i < task.logs.length; i++) {
        const m = task.logs[i];
        let cls = 'white';
        if (m.includes('====')) cls = 'bright';
        else if (m.startsWith('爬取') || m.startsWith('取得') || m.startsWith('產生') || m.startsWith('下載')) cls = 'muted';
        else if (m.startsWith('錯誤') || m.startsWith('警告')) cls = 'error';
        addLog(m, cls);
      }
      if (task.status === 'done') {
        clearInterval(polling); polling = null;
        setStatus('done');
        addLog('', '');
        addLog('NFO 檔案輸出到: ' + task.output, 'bright');
      } else if (task.status === 'error') {
        clearInterval(polling); polling = null;
        setStatus('error');
      }
    } catch {}
  }, 1000);
}

document.getElementById('queryInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

// ── 懸浮封面預覽 ──────────────────────────────────────────
const floatEl = document.createElement('div');
floatEl.id = 'poster-float';
floatEl.innerHTML = '<img alt="">';
document.body.appendChild(floatEl);
const floatImg = floatEl.querySelector('img');

const PW = 160, PH = 232, GAP = 18;
let floatTimer = null;
let activeItem = null;

function showFloat(mx, my) {
  const vw = window.innerWidth, vh = window.innerHeight;
  let x = mx + GAP;
  if (x + PW > vw - 8) x = mx - PW - GAP;
  let y = my - PH / 2;
  if (y < 8) y = 8;
  if (y + PH > vh - 8) y = vh - PH - 8;
  floatEl.style.left = x + 'px';
  floatEl.style.top  = y + 'px';
  floatEl.classList.add('show');
}

function hideFloat() {
  floatEl.classList.remove('show');
  activeItem = null;
}

resultsEl.addEventListener('mouseover', e => {
  const item = e.target.closest('.r-item');
  if (item === activeItem) return;
  clearTimeout(floatTimer);
  hideFloat();
  if (!item) return;
  const thumb = item.querySelector('.r-poster');
  if (!thumb || thumb.dataset.failed || !thumb.naturalWidth) return;
  activeItem = item;
  floatImg.src = thumb.src;
  floatTimer = setTimeout(() => showFloat(
    parseInt(floatEl.style.left) || 0,
    parseInt(floatEl.style.top)  || 0
  ), 120);
});

resultsEl.addEventListener('mousemove', e => {
  if (!activeItem) return;
  clearTimeout(floatTimer);
  floatTimer = setTimeout(() => showFloat(e.clientX, e.clientY), 60);
  if (floatEl.classList.contains('show')) showFloat(e.clientX, e.clientY);
});

resultsEl.addEventListener('mouseleave', () => {
  clearTimeout(floatTimer);
  hideFloat();
});
// ─────────────────────────────────────────────────────────
</script>
</body>
</html>
